<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Showroom Ô Tô Cực Chất</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; background-color: #f4f4f9; }
        header { background: #333; color: white; padding: 20px; text-align: center; }
        .container { max-width: 1200px; margin: 20px auto; padding: 0 20px; }
        .car-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .car-card { background: white; border-radius: 8px; padding: 20px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); border-top: 5px solid #007bff; }
        .car-card h3 { margin-top: 0; color: #333; }
        .price { color: #e74c3c; font-weight: bold; font-size: 1.2em; }
        .btn { display: inline-block; background: #007bff; color: white; padding: 10px 15px; border: none; border-radius: 5px; cursor: pointer; text-decoration: none; margin-top: 10px; }
        .btn:hover { background: #0056b3; }
        /* Form Đặt Lịch */
        .booking-box { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 500px; margin: 0 auto; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
    </style>
</head>
<body>

<header>
    <h1>🚗 SHOWROOM Ô TÔ HÙNG 16 🚗</h1>
    <p>Nơi trao gửi niềm tin - Trải nghiệm siêu xe công nghệ</p>
</header>

<div class="container">
    <h2>✨ Danh Sách Xe Đang Chào Bán</h2>
    <div class="car-grid" id="car-list">
        </div>

    <hr style="border: 1px solid #ddd; margin: 40px 0;">

    <div class="booking-box">
        <h2>📅 Đăng Ký Lái Thử & Xem Xe</h2>
        <form id="booking-form">
            <div class="form-group">
                <label>Họ và Tên:</label>
                <input type="text" id="customerName" required placeholder="Ví dụ: Nguyễn Văn A">
            </div>
            <div class="form-group">
                <label>Số Điện Thoại:</label>
                <input type="tel" id="phone" required placeholder="Ví dụ: 0901234567">
            </div>
            <div class="form-group">
                <label>Chọn Xe Muốn Xem:</label>
                <select id="carId" required>
                    <option value="">-- Chọn xe --</option>
                </select>
            </div>
            <div class="form-group">
                <label>Ngày Giờ Hẹn Đến:</label>
                <input type="datetime-local" id="appointmentDate" required>
            </div>
            <div class="form-group">
                <label>Ghi chú thêm:</label>
                <textarea id="notes" rows="3" placeholder="Yêu cầu về màu sắc, phiên bản..."></textarea>
            </div>
            <button type="submit" class="btn" style="width: 100%;">GỬI YÊU CẦU ĐẶT LỊCH</button>
        </form>
    </div>
</div>

<script>
    // 🌟 1. Gọi API lấy danh sách xe đổ ra màn hình và nhét vào ô Select Form
    async function loadData() {
        try {
            const res = await fetch('/api/cars');
            const cars = await res.json();
            
            const carList = document.getElementById('car-list');
            const carSelect = document.getElementById('carId');
            
            carList.innerHTML = '';
            
            if(cars.length === 0) {
                carList.innerHTML = '<p>Hiện tại chưa có xe nào trong kho.</p>';
            }

            cars.forEach(car => {
                // Hiển thị dạng Card
                carList.innerHTML += `
                    <div class="car-card">
                        <h3>${car.name}</h3>
                        <p><strong>Hãng:</strong> ${car.brand} | <strong>Loại:</strong> ${car.type}</p>
                        <p class="price">Giá: ${car.price.toLocaleString('vi-VN')} VNĐ</p>
                        <p><strong>Màu:</strong> ${car.color} | <strong>Trạng thái:</strong> ${car.status}</p>
                        <p><em>${car.description || ''}</em></p>
                    </div>
                `;
                // Nhét vào thẻ select trong Form
                carSelect.innerHTML += `<option value="${car._id}">${car.name} (${car.brand})</option>`;
            });
        } catch (err) {
            console.error("Lỗi tải dữ liệu xe:", err);
        }
    }

    // 🌟 2. Xử lý sự kiện khi khách bấm nút "Gửi yêu cầu đặt lịch"
    document.getElementById('booking-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const bookingData = {
            customerName: document.getElementById('customerName').value,
            phone: document.getElementById('phone').value,
            carId: document.getElementById('carId').value,
            appointmentDate: document.getElementById('appointmentDate').value,
            notes: document.getElementById('notes').value
        };

        try {
            const response = await fetch('/api/bookings', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(bookingData)
            });
            
            const result = await response.json();
            if (response.ok) {
                alert("🎉 " + result.message);
                document.getElementById('booking-form').reset();
            } else {
                alert("❌ Lỗi: " + result.message);
            }
        } catch (err) {
            alert("❌ Không thể kết nối tới Server Backend");
        }
    });

    // Chạy tải dữ liệu ngay khi mở web
    loadData();
</script>
</body>
</html>
