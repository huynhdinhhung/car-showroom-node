name: Build and Push Docker Image

# Luồng này sẽ tự kích hoạt mỗi khi bạn PUSH code lên nhánh main
on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
    
    # 1. Kéo code từ GitHub về máy ảo của GitHub
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. Đăng nhập vào hệ thống Docker Hub bằng Secret đã cài ở Bước 2
    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # 3. Tiến hành Build Docker Image và Đẩy (Push) lên Docker Hub luôn
    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        # ⚠️ Hãy thay chữ 'huynhdinhhung' bằng đúng TÊN TÀI KHOẢN DOCKER HUB của bạn nếu nó khác nhé:
        tags: huynhdinhhung/car-showroom:latest
